{% extends "base.html" %}
{% block title %}Login · Chamados{% endblock %}
{% block content %}
<section class="login-panel">
  <div>
    <h1>Chamados TI</h1>
    <p>Entre para abrir, acompanhar e atender solicitações dos hotéis.</p>
  </div>
  <form class="form-card" action="/login" method="post">
    <label>
      Usuário
      <input name="username" value="{{ username or '' }}" autocomplete="username" autofocus required>
    </label>
    <label>
      Senha
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    {% if error %}
    <div class="field-error">{{ error }}</div>
    {% endif %}
    <button type="submit">Entrar</button>
    <p class="hint">Inicial: suporte / suporte123 ou usuario / usuario123</p>
  </form>
</section>
{% endblock %}
